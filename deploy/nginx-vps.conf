# ─────────────────────────────────────────────────
# Production nginx config for excel.frillchills.com
# ─────────────────────────────────────────────────
# Copy to: /etc/nginx/sites-available/excel.frillchills.com
# Then: sudo ln -s /etc/nginx/sites-available/excel.frillchills.com /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────

server {
    listen 80;
    server_name excel.frillchills.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name excel.frillchills.com;

    # ── SSL (set up with Certbot) ───────────────────
    ssl_certificate     /etc/letsencrypt/live/excel.frillchills.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/excel.frillchills.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Root directory for built frontend ──────────
    root /var/www/excel.frillchills.com/html;
    index index.html;

    # ── Gzip ───────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;

    # ── API proxy → backend on port 3004 ──────────
    location /api/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for large invoice uploads
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── SPA fallback ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Don't cache index.html so new deploys take effect immediately
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ── Static assets with long cache ─────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
